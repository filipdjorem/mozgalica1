<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mozgalica - Uredi pitanja</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="vlasniksobe.css" />
</head>
<body class="bg">

  <header class="topbar">
    <div class="topbar__inner">
      <a href="index.html" class="brand" aria-label="Početna stranica">
        <img src="logo1.png" alt="Mozgalica logo" class="brand__logo">
        <span>Mozgalica</span>
      </a>

      <nav class="topbar__actions">
        <a href="vlasniknapravisobu.html" class="btn btn--ghost">Nazad</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="page-hero page-hero--small edit-page-hero">
      <p class="page-hero__label">Uređivanje kategorije</p>
      <h1 class="page-hero__title" id="editCategoryTitle">Pitanja kategorije</h1>
      <p class="page-hero__text" id="editCategoryText">
        Ovdje su prikazana sva pitanja iz odabrane kategorije.
      </p>
    </section>

    <section class="panel edit-panel">
      <div class="edit-panel__top">
        <div class="edit-category-badge" id="editCategoryBadge">Kategorija</div>

        <div class="edit-summary">
          <div class="edit-summary__card">
            <span>Ukupno pitanja</span>
            <strong id="ukupnoPitanja">0</strong>
          </div>

          <div class="edit-summary__card">
            <span>Označeno</span>
            <strong id="oznacenaPitanja">0</strong>
          </div>
        </div>
      </div>

      <div id="questionsContainer" class="questions-container">
        <div class="rooms-info">Učitavanje pitanja...</div>
      </div>

      <div class="bottom-actions edit-actions">
        <button type="button" class="btn btn--primary btn--big" id="btnSacuvajIzmjene">
          Sačuvaj izmjene
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
