<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mozgalica - Kviz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="kviz.css">
</head>

<body class="bg">

<header class="topbar">
  <div class="topbar__inner">
    <a href="index.html" class="brand">
      <img src="logo1.png" alt="Mozgalica logo" class="brand__logo">
      <span>Mozgalica</span>
    </a>

    <nav class="topbar__actions">
      <a href="vlasnikpostojecesobe.html" class="btn btn--ghost">Nazad</a>
    </nav>
  </div>
</header>

<main class="page kviz-page">

  <section class="kviz-info">
    <p class="kviz-label">Kviz je pokrenut</p>
    <h1>Mozgalica kviz</h1>
    <p>Odgovori na sva pitanja iz odabrane sobe. Na kraju će biti prikazan tvoj rezultat.</p>
  </section>

  <section class="kviz-panel" id="quizPanel">

    <div class="kviz-top">
      <span class="kviz-question-number" id="questionNumber">Pitanje 0/0</span>
  <span class="kviz-timer" id="timerBox">5s</span>
    </div>

    <div class="kviz-question" id="questionText">
      Učitavanje pitanja...
    </div>

    <div class="kviz-answers" id="answersBox"></div>

  </section>

</main>

<script src="kviz.js?v=1"></script>
</body>
</html>
